}function deleteWildcard(id) {
  const item = wildcards.find(w => w.id === id);
  if (!item) return;

  const ok = confirm(`Remove "${item.name}" from Our Own Discoveries?`);
  if (!ok) return;

  wildcards = wildcards.filter(w => w.id !== id);
  saveWildcards();
  renderWildcards();
  updateScorebarFull();
}
